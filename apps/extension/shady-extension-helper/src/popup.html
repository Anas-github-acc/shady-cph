<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 260px;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #0f172a;
      color: #f8fafc;
    }
    
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 10px;
    }
    
    h3 {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      background: linear-gradient(135deg, #3b82f6, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }
    
    /* Connection Status Card */
    .status-card {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 500;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    
    .status-dot.connected {
      background-color: #22c55e;
      animation: pulse-green 2s infinite;
    }
    
    .status-dot.connecting {
      background-color: #eab308;
      animation: pulse-yellow 2s infinite;
    }
    
    .status-dot.disconnected {
      background-color: #ef4444;
    }
    
    .status-text {
      color: #e2e8f0;
      text-transform: capitalize;
    }
    
    .status-details {
      font-size: 10px;
      color: #64748b;
      word-break: break-all;
      font-family: monospace;
    }

    .field {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      font-size: 12px;
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #f8fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    input[type="text"]:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }
    
    /* Sleek Switch Toggle */
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    
    .toggle-row label {
      margin-bottom: 0;
    }
    
    .switch {
      position: relative;
      display: inline-block;
      width: 34px;
      height: 20px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #334155;
      transition: .3s;
      border-radius: 20px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #3b82f6;
    }
    
    input:checked + .slider:before {
      transform: translateX(14px);
    }
    
    button {
      width: 100%;
      padding: 8px 12px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: transform 0.1s, opacity 0.2s;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    
    button:hover {
      opacity: 0.95;
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    @keyframes pulse-green {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
      }
    }
    
    @keyframes pulse-yellow {
      0% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(234, 179, 8, 0.7);
      }
      70% {
        transform: scale(1);
        box-shadow: 0 0 0 6px rgba(234, 179, 8, 0);
      }
      100% {
        transform: scale(0.95);
        box-shadow: 0 0 0 0 rgba(234, 179, 8, 0);
      }
    }
  </style>
  <script type="module" crossorigin src="/assets/src/popup-FI-wyd6J.js"></script>
</head>
<body>
  <div class="header">
    <h3>Shady Linker</h3>
  </div>
  
  <div class="status-card">
    <div class="status-row">
      <span id="statusDot" class="status-dot disconnected"></span>
      <span>Daemon: <span id="statusText" class="status-text">disconnected</span></span>
    </div>
    <div id="statusDetails" class="status-details">Not connecting</div>
  </div>

  <div class="field">
    <label for="hostUrl">Host URL</label>
    <input type="text" id="hostUrl" value="http://localhost:42585">
  </div>
  
  <div class="toggle-row">
    <label for="consoleOnly">Console Only Mode</label>
    <label class="switch">
      <input type="checkbox" id="consoleOnly">
      <span class="slider"></span>
    </label>
  </div>
  
  <button id="saveBtn">Save Settings</button>
</body>
</html>
