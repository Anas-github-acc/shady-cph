<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 220px; font-family: Arial, sans-serif; padding: 10px; margin: 0; }
    h3 { margin-top: 0; color: #3b5998; font-size: 14px; }
    .field { margin-bottom: 12px; }
    label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; }
    input[type="text"] { width: 95%; padding: 4px; font-size: 12px; }
    .checkbox-label { display: flex; align-items: center; font-size: 12px; cursor: pointer; }
    .checkbox-label input { margin-right: 6px; }
    button { width: 100%; padding: 6px; background: #3b5998; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2d4373; }
  </style>
</head>
<body>
  <h3>Shady Linker Settings</h3>
  <div class="field">
    <label for="hostUrl">Host URL</label>
    <input type="text" id="hostUrl" value="http://localhost:42585">
  </div>
  <div class="field">
    <label class="checkbox-label">
      <input type="checkbox" id="consoleOnly">
      Console Only Mode
    </label>
  </div>
  <button id="saveBtn">Save Settings</button>
  <script type="module" src="./popup.ts"></script>
</body>
</html>
